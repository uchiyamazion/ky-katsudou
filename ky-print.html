<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=820, initial-scale=0.45, maximum-scale=2.0, user-scalable=yes">
<title>KY(危険予知)活動記録表｜シオンテクノス</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "MS Gothic","Hiragino Kaku Gothic ProN",monospace; font-size: 11px; background: #999; color: #000; }

.ctrl-bar {
  background: #0d47a1; padding: 9px 16px;
  display: flex; gap: 8px; align-items: center;
  position: sticky; top: 0; z-index: 50;
}
.cb { padding: 7px 16px; border: none; border-radius: 4px; font-size: 13px; font-weight: 700; cursor: pointer; }
.cb-p { background: #fff; color: #0d47a1; }
.cb-c { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4); color: #fff; }
.ctrl-note { font-size: 11px; color: rgba(255,255,255,0.65); margin-left: 6px; }

@media screen and (max-width: 600px) {
  .page-wrap { margin: 0; box-shadow: none; }
  .ctrl-bar { flex-wrap: wrap; gap: 6px; padding: 8px 10px; }
  .cb { padding: 6px 12px; font-size: 12px; }
  .ctrl-note { font-size: 10px; width: 100%; margin-left: 0; }
}
@media print {
  .ctrl-bar { display: none !important; }
  body { background: #fff; }
  .page-wrap { margin: 0; box-shadow: none; }
}

.page-wrap { max-width: 820px; margin: 14px auto 40px; background: #fff; box-shadow: 0 3px 20px rgba(0,0,0,0.35); }
.rp { padding: 22px 26px 20px; position: relative; }

.page-tag { position: absolute; top: 10px; right: 14px; font-size: 9px; letter-spacing: 0.2em; color: #555; }

.title-wrap { text-align: center; margin-bottom: 16px; margin-top: 6px; }
.title-wrap h1 {
  display: inline-block; font-size: 20px; font-weight: bold; letter-spacing: 0.25em;
  border: 2px solid #4fc3f7; padding: 6px 28px; color: #000;
}

.top-tbl { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
.top-tbl td { border: 1px solid #4fc3f7; padding: 6px 10px; font-size: 12px; vertical-align: middle; }
.top-tbl .lbl { background: #ddf4fc; font-weight: bold; text-align: center; white-space: nowrap; width: 90px; }
.top-tbl .wide { font-size: 13px; font-weight: bold; }

.section-title {
  background: #0d47a1; color: #fff; font-size: 12.5px; font-weight: bold;
  padding: 5px 10px; margin: 14px 0 0; letter-spacing: .1em;
}

.hazard-tbl { width: 100%; border-collapse: collapse; margin-bottom: 4px; }
.hazard-tbl td, .hazard-tbl th {
  border: 1px solid #4fc3f7; padding: 6px 8px; font-size: 11.5px; vertical-align: top;
}
.hazard-tbl th { background: #ddf4fc; text-align: center; font-weight: bold; }
.hazard-tbl .hnum { width: 32px; text-align: center; font-weight: bold; background: #f2fbff; }
.hazard-tbl .hpoint { width: 46%; }
.hazard-tbl .haction { }

.priority-box {
  border: 1.5px solid #d97706; background: #fff8ee; padding: 8px 12px; margin-top: 4px;
  font-size: 12.5px; min-height: 22px;
}

.signer-tbl { width: 100%; border-collapse: collapse; margin-top: 4px; }
.signer-tbl td { border: 1px solid #4fc3f7; padding: 6px 8px; font-size: 11.5px; vertical-align: middle; }
.signer-tbl .sn-name { width: 25%; font-weight: bold; }
.signer-tbl .sn-sign { text-align: center; height: 40px; }
.signer-tbl .sn-sign img { max-height: 34px; max-width: 90%; filter: contrast(3); mix-blend-mode: multiply; }
.signer-tbl .sn-sign .sp { color: #bbb; font-size: 10px; }

.footer-area { display: flex; align-items: flex-end; justify-content: space-between; margin-top: 18px; padding-top: 10px; border-top: 1px solid #ccc; }
.footer-logo img { height: 26px; }
.qr-corner { text-align: center; }
.qr-lbl { font-size: 9px; color: #333; margin-bottom: 3px; line-height: 1.4; }
#qr-code img, #qr-code canvas { width: 64px !important; height: 64px !important; }

@media screen and (max-width: 600px) {
  .top-tbl .lbl { width: 68px; font-size: 10.5px; }
  .top-tbl td { padding: 5px 6px; font-size: 11px; }
}
</style>
</head>
<body>

<div class="ctrl-bar">
  <button class="cb cb-p" onclick="window.print()">🖨 印刷 / PDF保存</button>
  <button class="cb cb-c" onclick="window.close()">✕ 閉じる</button>
  <span class="ctrl-note">署名はQRコードから作業者・確認者にご入力いただけます</span>
</div>

<div class="page-wrap"><div class="rp">

  <div class="page-tag">現　場　控</div>

  <div class="title-wrap">
    <h1>KY（危険予知）活動記録表</h1>
  </div>

  <div id="loading-note" style="text-align:center;padding:30px;color:#666;">読み込み中…</div>

  <div id="report-body" style="display:none;">

    <table class="top-tbl">
      <tr>
        <td class="lbl">日　付</td><td id="p-date" style="width:22%"></td>
        <td class="lbl">現場名</td><td class="wide" id="p-siteName"></td>
      </tr>
      <tr>
        <td class="lbl">作業内容</td><td colspan="3" class="wide" id="p-workContent"></td>
      </tr>
    </table>

    <div class="section-title">危険予知（どんな危険が潜んでいるか）</div>
    <table class="hazard-tbl" id="hazard-tbl">
      <tr><th class="hnum">No</th><th class="hpoint">危険のポイント</th><th class="haction">対策・行動目標</th></tr>
      <!-- rows injected -->
    </table>

    <div class="section-title">今日の重点実施項目</div>
    <div class="priority-box" id="p-priorityAction"></div>

    <div class="section-title">作業者（内容確認・署名）</div>
    <table class="signer-tbl" id="worker-tbl">
      <!-- rows injected -->
    </table>

    <div class="section-title">確認者</div>
    <table class="signer-tbl" id="confirm-tbl">
      <!-- rows injected -->
    </table>

    <div class="footer-area">
      <div class="footer-logo"><div style="font-size:13px;font-weight:bold;color:#0066cc;">シオンテクノス株式会社</div></div>
      <div class="qr-corner">
        <div class="qr-lbl">スマホで内容確認・署名<br><span id="qr-url-text" style="font-size:7px;color:#aaa;word-break:break-all"></span></div>
        <div id="qr-code"></div>
      </div>
    </div>

  </div>

</div></div>

<script src="js/config.js"></script>
<script>
const P = new URLSearchParams(location.search);
const recordId = P.get('id');

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return String(d);
  return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
}

async function loadAndRender() {
  if (!recordId) {
    document.getElementById('loading-note').textContent = 'URLにidが指定されていません。';
    return;
  }
  try {
    const res = await fetch(`${GAS_URL}?action=ky_get&id=${encodeURIComponent(recordId)}`);
    const json = await res.json();
    if (json.status !== 'success') throw new Error(json.data || '取得に失敗しました');
    render(json.data);
  } catch (err) {
    document.getElementById('loading-note').textContent = '読み込みに失敗しました: ' + err.message;
  }
}

function signRowHtml(name, signature) {
  return `
    <tr>
      <td class="sn-name">${escapeHtml(name || '')}</td>
      <td class="sn-sign">${signature ? `<img src="${signature}" alt="署名">` : `<span class="sp">（サインなし）</span>`}</td>
    </tr>
  `;
}

function render(data) {
  document.getElementById('loading-note').style.display = 'none';
  document.getElementById('report-body').style.display = 'block';

  document.getElementById('p-date').textContent = formatDate(data.date);
  document.getElementById('p-siteName').textContent = data.siteName || '';
  document.getElementById('p-workContent').textContent = data.workContent || '';
  document.getElementById('p-priorityAction').textContent = data.priorityAction || '';

  const hazards = Array.isArray(data.hazards) ? data.hazards : [];
  const hazardTbl = document.getElementById('hazard-tbl');
  hazards.forEach((h, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="hnum">${i+1}</td><td class="hpoint">${escapeHtml(h.point||'')}</td><td class="haction">${escapeHtml(h.action||'')}</td>`;
    hazardTbl.appendChild(tr);
  });
  if (!hazards.length) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="3" style="text-align:center;color:#999;">登録なし</td>`;
    hazardTbl.appendChild(tr);
  }

  const workers = Array.isArray(data.workers) ? data.workers : [];
  const workerTbl = document.getElementById('worker-tbl');
  workerTbl.innerHTML = workers.length
    ? workers.map(w => signRowHtml(w.name, w.signature)).join('')
    : `<tr><td style="text-align:center;color:#999;">作業者の登録がありません</td></tr>`;

  document.getElementById('confirm-tbl').innerHTML = data.confirmedBy
    ? signRowHtml(data.confirmedBy, data.confirmedBySignature)
    : `<tr><td style="text-align:center;color:#999;">確認者の登録がありません</td></tr>`;

  // QR: ky-view.html で内容確認・署名
  const base = location.origin + location.pathname.replace('ky-print.html', '');
  const qrUrl = base + 'ky-view.html?id=' + (data.id || '');
  document.getElementById('qr-url-text').textContent = qrUrl.replace('https://', '');
  if (typeof QRCode !== 'undefined' && data.id) {
    new QRCode(document.getElementById('qr-code'), { text: qrUrl, width: 64, height: 64, colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.M });
  }
}

loadAndRender();
</script>
</body>
</html>
